name: A11y SARIF Test

"on":
  pull_request:
    types: [opened, synchronize]

permissions:
  security-events: write
  contents: read
  pull-requests: write

jobs:
  a11y-sarif-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SARIF from mock a11y scan
        run: |
          cat > results.sarif << 'SARIF_END'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {
                "driver": {
                  "name": "Accessibility Scanner",
                  "semanticVersion": "1.0.0",
                  "rules": [
                    {
                      "id": "a11y/image-alt",
                      "shortDescription": { "text": "Images must have alternate text" },
                      "fullDescription": { "text": "Ensures img elements have alternate text" },
                      "help": { "text": "Add alt attribute to img elements.", "markdown": "Add `alt` attribute to `<img>` elements." },
                      "defaultConfiguration": { "level": "error" }
                    },
                    {
                      "id": "a11y/button-name",
                      "shortDescription": { "text": "Buttons must have discernible text" },
                      "fullDescription": { "text": "Ensures buttons have accessible names" },
                      "help": { "text": "Add text or aria-label to buttons.", "markdown": "Add text or `aria-label` to `<button>` elements." },
                      "defaultConfiguration": { "level": "error" }
                    }
                  ]
                }
              },
              "results": [
                {
                  "ruleId": "a11y/image-alt",
                  "level": "error",
                  "message": { "text": "img element does not have an alt attribute" },
                  "locations": [{ "physicalLocation": { "artifactLocation": { "uri": "index.html", "uriBaseId": "%SRCROOT%" }, "region": { "startLine": 3, "startColumn": 3 } } }],
                  "partialFingerprints": { "primaryLocationLineHash": "img-alt-line3" }
                },
                {
                  "ruleId": "a11y/button-name",
                  "level": "error",
                  "message": { "text": "button element has no accessible name" },
                  "locations": [{ "physicalLocation": { "artifactLocation": { "uri": "index.html", "uriBaseId": "%SRCROOT%" }, "region": { "startLine": 5, "startColumn": 3 } } }],
                  "partialFingerprints": { "primaryLocationLineHash": "btn-name-line5" }
                }
              ]
            }]
          }
          SARIF_END
          echo "SARIF generated"

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: a11y-scan
